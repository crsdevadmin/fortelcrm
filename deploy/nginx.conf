# /etc/nginx/sites-available/fortel
# Copy to EC2: sudo cp nginx.conf /etc/nginx/sites-available/fortel
#              sudo ln -s /etc/nginx/sites-available/fortel /etc/nginx/sites-enabled/
#              sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # Replace _ with your domain once you have one

    # ── API — proxy to FastAPI ──────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Direct API access (no /api/ prefix) ─────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# Once you have a domain, run:
#   sudo certbot --nginx -d yourdomain.com
# Certbot will add the HTTPS block automatically.
