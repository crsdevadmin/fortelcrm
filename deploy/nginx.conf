# /etc/nginx/sites-available/fortel
# Copy to EC2: sudo cp nginx.conf /etc/nginx/sites-available/fortel
#              sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    root /var/www/fortel-crm;
    index index.html;

    location = /api/health {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ ^/(auth|users|sales|investments|roi|regions|doctors|products|visits|exports|docs|redoc|openapi\.json)(/|$) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Once you have a domain, run:
#   sudo certbot --nginx -d yourdomain.com
# Certbot will add the HTTPS block automatically.
